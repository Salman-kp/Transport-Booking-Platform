apiVersion: apps/v1
kind: Deployment
metadata:
  name: redpanda-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redpanda
  template:
    metadata:
      labels:
        app: redpanda
    spec:
      containers:
        - name: redpanda
          image: docker.redpanda.com/redpandadata/redpanda:latest
          imagePullPolicy: IfNotPresent
          command:
            - redpanda
            - start
            - --mode
            - dev-container
            - --smp
            - "1"
            - --memory
            - 512Mi
            - --reserve-memory
            - 0M
            - --overprovisioned
            - --kafka-addr
            - internal://0.0.0.0:9092
            - --advertise-kafka-addr
            - internal://redpanda-service:9092
          ports:
            - containerPort: 9092
